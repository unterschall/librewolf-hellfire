name: Build & release LibreWolf HellFire

# Builds LibreWolf + HellFire from the upstream integration repo and publishes the
# resulting binary as a GitHub Release that the AUR `librewolf-hellfire-bin`
# package consumes. Optionally pushes the updated AUR package afterwards.
#
# Resource note: this is a full Firefox source build with LTO (+ optional PGO).
# The standard `ubuntu-latest` runner (4 vCPU / 16 GB RAM / ~14 GB disk) is
# marginal — the disk-freeing step buys ~40 GB, and the build can brush up against
# the 6 h job limit. For reliable runs use a larger or self-hosted runner and
# adjust `runs-on`.

# Triggered manually or on a weekly schedule only — never on plain pushes, so a
# routine commit doesn't kick off a multi-hour build. Fast validation lives in
# ci.yml.
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild even if a release for the current version already exists"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — catch upstream version bumps

permissions:
  contents: write # needed to create releases

env:
  UPSTREAM_REPO: https://codeberg.org/FailsafeDX/librewolf-hellfire.git
  # Portable baseline so the binary runs on any modern x86_64 CPU
  # (x86-64-v3 ≈ AVX2 + SSE4.2 + FMA + BMI). Overrides HellFire's -march=native.
  PORTABLE_MARCH: "-march=x86-64-v3 -mtune=generic"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      built: ${{ steps.gate.outputs.skip == 'false' }}
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git python3 python3-dev python3-pip curl wget \
            zstd pigz nodejs npm clang lld llvm nasm yasm unzip zip jq \
            libxml2-dev libssl-dev mercurial m4 pkg-config xvfb dbus-x11

      - name: Clone integration repo
        id: meta
        run: |
          git clone --recursive --depth 1 "$UPSTREAM_REPO" lwhf
          cd lwhf
          {
            echo "version=$(cat version)"
            echo "release=$(cat release)"
            echo "tag=$(cat version)-$(cat release)"
          } >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ inputs.force }}" != "true" ] \
             && gh release view "${{ steps.meta.outputs.tag }}" \
                  --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release ${{ steps.meta.outputs.tag }} already exists — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate mozconfig.new + apply portable CPU baseline
        if: steps.gate.outputs.skip == 'false'
        run: |
          cd lwhf
          # librewolf-patches.py copies assets/mozconfig.new, which this fork does
          # not ship; its assets/mozconfig is also wrapped in markdown ``` fences.
          # Strip the fences to produce the mozconfig.new the build expects.
          grep -v '^```' assets/mozconfig > assets/mozconfig.new
          # Portable baseline so the binary runs on any modern x86_64 CPU.
          sed -i "s/-march=native -mtune=native/${PORTABLE_MARCH}/g" assets/mozconfig.new
          grep -n "march" assets/mozconfig.new || true

      - name: Prepare source tree (fetch Firefox + apply patches)
        if: steps.gate.outputs.skip == 'false'
        run: |
          cd lwhf
          make fetch
          make dir

      - name: Bootstrap Mozilla build environment
        if: steps.gate.outputs.skip == 'false'
        run: |
          cd lwhf && make bootstrap

      - name: Build
        if: steps.gate.outputs.skip == 'false'
        run: |
          cd lwhf
          # MOZ_PGO=1 in HellFire's mozconfig runs an instrumented browser, which
          # needs a display + dbus session. xvfb-run provides both.
          ulimit -n 4096 || true
          xvfb-run -a -s "-screen 0 1920x1080x24 -nolisten local" \
            dbus-run-session -- make build

      - name: Package
        if: steps.gate.outputs.skip == 'false'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          RELEASE: ${{ steps.meta.outputs.release }}
        run: |
          cd lwhf
          make package
          src=$(ls librewolf-${VERSION}-${RELEASE}.en-US.linux-*.tar.xz | head -n1)
          out="librewolf-hellfire-${TAG}-linux-x86_64.tar.xz"
          mv -v "$src" "${GITHUB_WORKSPACE}/$out"
          cd "${GITHUB_WORKSPACE}"
          sha256sum "$out" | tee "$out.sha256"

      - name: Publish GitHub Release
        if: steps.gate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          RELEASE: ${{ steps.meta.outputs.release }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "LibreWolf HellFire $TAG" \
            --notes "Automated build of LibreWolf $VERSION (release $RELEASE) with HellFire optimizations, compiled with ${PORTABLE_MARCH}." \
            "librewolf-hellfire-${TAG}-linux-x86_64.tar.xz" \
            "librewolf-hellfire-${TAG}-linux-x86_64.tar.xz.sha256"

  # Optional: bump + push librewolf-hellfire-bin to the AUR after a release.
  # Enable by adding the secret AUR_SSH_PRIVATE_KEY (a key registered with your
  # AUR account). Runs in an Arch container because it needs makepkg/updpkgsums.
  publish-aur:
    needs: build
    if: needs.build.outputs.built == 'true'
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Gate on AUR secret
        id: haskey
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$AUR_SSH_PRIVATE_KEY" ]; then echo "have=true" >> "$GITHUB_OUTPUT"
          else echo "have=false (set AUR_SSH_PRIVATE_KEY to enable)"; echo "have=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/checkout@v4
        if: steps.haskey.outputs.have == 'true'
      - name: Update and push AUR package
        if: steps.haskey.outputs.have == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          TAG: ${{ needs.build.outputs.tag }}
        run: ./scripts/update-aur-bin.sh
